<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김치프리미엄 대시보드</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>김치프리미엄 대시보드</h1>
            <p class="subtitle" id="subtitle">GOLD &middot; BITCOIN &middot; USDT</p>
            <p class="updated-at" id="updated-at"></p>
        </header>

        <div class="tab-nav">
            <button class="tab-btn active" data-asset="gold" onclick="switchTab('gold')">GOLD</button>
            <button class="tab-btn" data-asset="bitcoin" onclick="switchTab('bitcoin')">BITCOIN</button>
            <button class="tab-btn" data-asset="usdt" onclick="switchTab('usdt')">USDT</button>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p>데이터를 불러오는 중...</p>
        </div>

        <div id="error" style="display:none;">
            <p class="error-msg"></p>
        </div>

        <div id="content" style="display:none;">
            <div class="cards">
                <div class="card">
                    <div class="card-label">현재 괴리율</div>
                    <div class="card-value" id="current-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label">최대 괴리율</div>
                    <div class="card-value" id="max-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label">평균 괴리율</div>
                    <div class="card-value" id="avg-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label" id="high-gap-label">5%+ 발생</div>
                    <div class="card-value" id="high-gap-count">-</div>
                </div>
            </div>

            <div class="chart-container">
                <h2 id="price-chart-title">가격 비교</h2>
                <canvas id="priceChart"></canvas>
            </div>

            <div class="chart-container">
                <h2>괴리율 추이 (%)</h2>
                <canvas id="gapChart"></canvas>
            </div>

            <div class="table-container">
                <h2 id="table-title">괴리율 발생 구간</h2>
                <table id="gapTable">
                    <thead>
                        <tr>
                            <th>시작일</th>
                            <th>종료일</th>
                            <th>최대 괴리율</th>
                            <th>지속일수</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <p id="no-periods" style="display:none; text-align:center;"></p>
            </div>
        </div>

        <div class="footer">
            데이터 출처: KRX, COMEX, Upbit, yfinance
        </div>
    </div>

    <script>
    /* ── Chart.js 다크 테마 글로벌 설정 ── */
    Chart.defaults.color = '#9aa0b0';
    Chart.defaults.borderColor = 'rgba(42, 45, 58, 0.8)';
    Chart.defaults.font.family = "'Inter', sans-serif";

    const ASSETS = {
        gold: {
            label: 'Gold',
            domesticLabel: '국내 (KRX 금현물)',
            intlLabel: '국제 (COMEX, KRW 환산)',
            unit: 'KRW/g',
            threshold: 5,
            domesticColor: '#f0b90b',
            intlColor: '#4a90d9',
            gapColor: '#f0b90b',
            highlightColor: 'rgba(240, 185, 11, 0.08)',
        },
        bitcoin: {
            label: 'Bitcoin',
            domesticLabel: '업비트 BTC',
            intlLabel: 'BTC 국제가 (KRW 환산)',
            unit: 'KRW',
            threshold: 5,
            domesticColor: '#f7931a',
            intlColor: '#4a90d9',
            gapColor: '#f7931a',
            highlightColor: 'rgba(247, 147, 26, 0.08)',
        },
        usdt: {
            label: 'USDT',
            domesticLabel: '업비트 USDT',
            intlLabel: 'USDT 국제가 (KRW 환산)',
            unit: 'KRW',
            threshold: 3,
            domesticColor: '#26a17b',
            intlColor: '#4a90d9',
            gapColor: '#26a17b',
            highlightColor: 'rgba(38, 161, 123, 0.08)',
        },
    };

    let allData = null;
    let currentAsset = 'gold';
    let priceChartInstance = null;
    let gapChartInstance = null;

    async function loadData() {
        try {
            const resp = await fetch('data.json');
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.error || `HTTP ${resp.status}`);
            }
            allData = await resp.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            if (allData.updated_at) {
                document.getElementById('updated-at').textContent =
                    'Last updated: ' + allData.updated_at;
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                const asset = btn.dataset.asset;
                if (!allData[asset]) {
                    btn.disabled = true;
                }
            });

            const firstAvailable = ['gold', 'bitcoin', 'usdt'].find(a => allData[a]);
            if (firstAvailable) switchTab(firstAvailable);
        } catch (e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.querySelector('.error-msg').textContent =
                '데이터 로딩 실패: ' + e.message;
        }
    }

    function switchTab(asset) {
        currentAsset = asset;
        const config = ASSETS[asset];
        const data = allData[asset];
        if (!data) return;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.asset === asset);
        });

        document.getElementById('subtitle').textContent = config.label;
        updateCards(data, config);

        document.getElementById('price-chart-title').textContent =
            config.label + ' 가격 비교 (' + config.unit + ')';
        document.getElementById('table-title').textContent =
            config.threshold + '% 이상 괴리율 발생 구간';
        document.getElementById('high-gap-label').textContent =
            config.threshold + '%+ 발생';

        if (priceChartInstance) { priceChartInstance.destroy(); priceChartInstance = null; }
        if (gapChartInstance) { gapChartInstance.destroy(); gapChartInstance = null; }

        renderPriceChart(data, config);
        renderGapChart(data, config);
        renderTable(data.high_gap_periods, config);
    }

    function updateCards(data, config) {
        const lastGap = data.gap_pct[data.gap_pct.length - 1];
        const absGaps = data.gap_pct.map(Math.abs);
        const maxGapIdx = absGaps.indexOf(Math.max(...absGaps));
        const maxGap = data.gap_pct[maxGapIdx];
        const avgGap = data.gap_pct.reduce((a, b) => a + b, 0) / data.gap_pct.length;

        document.getElementById('current-gap').textContent = lastGap.toFixed(2) + '%';
        document.getElementById('max-gap').textContent = maxGap.toFixed(2) + '%';
        document.getElementById('avg-gap').textContent = avgGap.toFixed(2) + '%';
        document.getElementById('high-gap-count').textContent =
            data.high_gap_periods.length + '회';

        const el = document.getElementById('current-gap');
        el.classList.remove('high', 'low');
        if (lastGap >= config.threshold) el.classList.add('high');
        else if (lastGap < 0) el.classList.add('low');
    }

    function formatPrice(value, asset) {
        if (asset === 'gold') return Number(value).toLocaleString() + ' 원/g';
        return Number(value).toLocaleString() + ' 원';
    }

    /* ── Chart: 가격 비교 ── */
    function renderPriceChart(data, config) {
        const ctx = document.getElementById('priceChart').getContext('2d');
        priceChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.dates,
                datasets: [
                    {
                        label: config.domesticLabel,
                        data: data.domestic_price,
                        borderColor: config.domesticColor,
                        backgroundColor: config.domesticColor + '18',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        fill: false,
                        tension: 0.1,
                    },
                    {
                        label: config.intlLabel,
                        data: data.intl_price,
                        borderColor: config.intlColor,
                        backgroundColor: config.intlColor + '18',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        fill: false,
                        tension: 0.1,
                    },
                ],
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.2,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        type: 'category',
                        grid: { color: 'rgba(42, 45, 58, 0.5)' },
                        ticks: { maxTicksLimit: 10, maxRotation: 0, font: { size: 11 } },
                    },
                    y: {
                        grid: { color: 'rgba(42, 45, 58, 0.5)' },
                        ticks: {
                            font: { size: 11 },
                            callback: v => v >= 1e6 ? (v / 1e6).toFixed(0) + 'M' : v.toLocaleString(),
                        },
                        title: { display: true, text: config.unit, font: { size: 11 } },
                    },
                },
                plugins: {
                    legend: {
                        labels: { usePointStyle: true, pointStyle: 'circle', padding: 20, font: { size: 12 } },
                    },
                    tooltip: {
                        backgroundColor: '#1e2130',
                        borderColor: '#363950',
                        borderWidth: 1,
                        titleFont: { size: 12 },
                        bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            label: ctx => ctx.dataset.label + ': ' + formatPrice(ctx.parsed.y, currentAsset),
                        },
                    },
                },
            },
        });
    }

    /* ── Chart: 괴리율 ── */
    function buildHighlightBoxes(data, config) {
        const boxes = {};
        let inRegion = false, regionStart = null, regionIdx = 0;
        const threshold = config.threshold;

        for (let i = 0; i < data.gap_pct.length; i++) {
            if (Math.abs(data.gap_pct[i]) >= threshold) {
                if (!inRegion) { inRegion = true; regionStart = data.dates[i]; }
            } else if (inRegion) {
                boxes['box' + regionIdx] = {
                    type: 'box', xMin: regionStart, xMax: data.dates[i - 1],
                    backgroundColor: config.highlightColor, borderWidth: 0,
                };
                regionIdx++;
                inRegion = false;
            }
        }
        if (inRegion) {
            boxes['box' + regionIdx] = {
                type: 'box', xMin: regionStart, xMax: data.dates[data.dates.length - 1],
                backgroundColor: config.highlightColor, borderWidth: 0,
            };
        }
        return boxes;
    }

    function renderGapChart(data, config) {
        const ctx = document.getElementById('gapChart').getContext('2d');
        const boxes = buildHighlightBoxes(data, config);
        const threshold = config.threshold;

        boxes['thresholdLine'] = {
            type: 'line', yMin: threshold, yMax: threshold,
            borderColor: 'rgba(246, 70, 93, 0.5)', borderWidth: 1.5, borderDash: [6, 4],
            label: {
                display: true, content: '+' + threshold + '%', position: 'end',
                backgroundColor: 'rgba(246, 70, 93, 0.7)', color: '#fff',
                font: { size: 10, family: "'JetBrains Mono', monospace" }, padding: { x: 6, y: 3 },
            },
        };
        boxes['negThresholdLine'] = {
            type: 'line', yMin: -threshold, yMax: -threshold,
            borderColor: 'rgba(74, 144, 217, 0.5)', borderWidth: 1.5, borderDash: [6, 4],
            label: {
                display: true, content: '-' + threshold + '%', position: 'end',
                backgroundColor: 'rgba(74, 144, 217, 0.7)', color: '#fff',
                font: { size: 10, family: "'JetBrains Mono', monospace" }, padding: { x: 6, y: 3 },
            },
        };
        boxes['zeroLine'] = {
            type: 'line', yMin: 0, yMax: 0,
            borderColor: 'rgba(154, 160, 176, 0.25)', borderWidth: 1,
        };

        const gradient = ctx.createLinearGradient(0, 0, 0, ctx.canvas.clientHeight || 300);
        gradient.addColorStop(0, config.gapColor + '30');
        gradient.addColorStop(1, config.gapColor + '02');

        gapChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.dates,
                datasets: [{
                    label: '괴리율 (%)',
                    data: data.gap_pct,
                    borderColor: config.gapColor,
                    backgroundColor: gradient,
                    borderWidth: 1.5,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: true,
                    tension: 0.1,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.2,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        type: 'category',
                        grid: { color: 'rgba(42, 45, 58, 0.5)' },
                        ticks: { maxTicksLimit: 10, maxRotation: 0, font: { size: 11 } },
                    },
                    y: {
                        grid: { color: 'rgba(42, 45, 58, 0.5)' },
                        ticks: { font: { size: 11 }, callback: v => v.toFixed(0) + '%' },
                        title: { display: true, text: '괴리율 (%)', font: { size: 11 } },
                    },
                },
                plugins: {
                    legend: { display: false },
                    annotation: { annotations: boxes },
                    tooltip: {
                        backgroundColor: '#1e2130',
                        borderColor: '#363950',
                        borderWidth: 1,
                        titleFont: { size: 12 },
                        bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            label: ctx => '괴리율: ' + ctx.parsed.y.toFixed(2) + '%',
                        },
                    },
                },
            },
        });
    }

    /* ── Table ── */
    function renderTable(periods, config) {
        const tbody = document.querySelector('#gapTable tbody');
        tbody.innerHTML = '';

        const noPeriods = document.getElementById('no-periods');
        const table = document.getElementById('gapTable');

        if (!periods || periods.length === 0) {
            table.style.display = 'none';
            noPeriods.textContent = config.threshold + '% 이상 괴리율 발생 구간이 없습니다.';
            noPeriods.style.display = 'block';
            return;
        }

        table.style.display = '';
        noPeriods.style.display = 'none';

        [...periods].sort((a, b) => b.max_gap - a.max_gap).forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${p.start}</td>
                <td>${p.end}</td>
                <td class="highlight">${p.max_gap.toFixed(2)}%</td>
                <td>${p.duration_days}일</td>
            `;
            tbody.appendChild(tr);
        });
    }

    loadData();
    </script>
</body>
</html>
