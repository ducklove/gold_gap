<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김치프리미엄 대시보드</title>
    <link rel="icon" type="image/svg+xml" href="static/icon.svg?v=1">
    <script>
    // iframe embed + theme: ?theme=dark|light overrides stored theme; ?embed hides chrome.
    (function() {
        try {
            var params = new URLSearchParams(location.search);
            var urlTheme = params.get('theme');
            var stored = localStorage.getItem('theme') || localStorage.getItem('preferred-theme');
            var theme = (urlTheme === 'dark' || urlTheme === 'light') ? urlTheme : (stored || 'light');
            document.documentElement.dataset.theme = theme === 'dark' ? 'dark' : 'light';
            var embed = params.get('embed');
            if (embed !== null && embed !== '0' && embed !== 'false') {
                document.documentElement.dataset.embed = '1';
            }
        } catch (e) {
            document.documentElement.dataset.theme = 'light';
        }
    })();
    </script>
    <style>
    /* iframe embed mode: hide standalone chrome so the dashboard fits a host frame */
    html[data-embed] .header,
    html[data-embed] footer { display: none !important; }
    html[data-embed] .container { padding-top: 14px !important; }
    </style>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <div>
                <h1>김치프리미엄 대시보드</h1>
                <div class="updated" id="updated-at"></div>
            </div>
            <div class="header-actions">
                <button type="button" class="refresh-btn" id="refreshBtn">새로고침</button>
                <button type="button" class="theme-toggle" id="themeToggle" title="테마 전환" aria-label="테마 전환">◐</button>
            </div>
        </div>
    </div>

    <main class="container">
        <section class="asset-overview">
            <div class="asset-overview-header">
                <div>
                    <div class="asset-kicker">Spread Monitor</div>
                    <h2 class="asset-title" id="asset-title">GOLD · BITCOIN · USDT</h2>
                    <p class="asset-summary" id="asset-summary">국내 거래가와 환산 국제가의 차이를 추적합니다.</p>
                    <p class="source-note" id="source-note"></p>
                </div>
                <div class="tab-nav" role="tablist" aria-label="자산 선택">
                    <button class="tab-btn active" data-asset="gold" role="tab" aria-selected="true" onclick="switchTab('gold')">GOLD</button>
                    <button class="tab-btn" data-asset="bitcoin" role="tab" aria-selected="false" onclick="switchTab('bitcoin')">BITCOIN</button>
                    <button class="tab-btn" data-asset="usdt" role="tab" aria-selected="false" onclick="switchTab('usdt')">USDT</button>
                </div>
            </div>
        </section>

        <div id="loading">
            <div class="spinner"></div>
            <p>데이터를 불러오는 중...</p>
        </div>

        <div id="error" style="display:none;">
            <p class="error-msg"></p>
        </div>

        <div id="content" style="display:none;">
            <div class="cards">
                <div class="card">
                    <div class="card-label">현재 괴리율</div>
                    <div class="card-value" id="current-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label">최대 괴리율</div>
                    <div class="card-value" id="max-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label">평균 괴리율</div>
                    <div class="card-value" id="avg-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label" id="high-gap-label">5%+ 발생</div>
                    <div class="card-value" id="high-gap-count">-</div>
                </div>
            </div>

            <div class="cards cards-secondary" id="asset-detail-cards" style="display:none;">
                <div class="card">
                    <div class="card-label">기준환율</div>
                    <div class="card-value" id="detail-usd-krw">-</div>
                    <div class="card-sub" id="detail-usd-krw-sub">USD/KRW</div>
                </div>
                <div class="card">
                    <div class="card-label" id="detail-domestic-label">국내가격</div>
                    <div class="card-value" id="detail-domestic-value">-</div>
                    <div class="card-sub" id="detail-domestic-sub"></div>
                </div>
                <div class="card" id="detail-intl-primary-card">
                    <div class="card-label" id="detail-intl-primary-label">국제가격</div>
                    <div class="card-value" id="detail-intl-primary-value">-</div>
                    <div class="card-sub" id="detail-intl-primary-sub"></div>
                </div>
                <div class="card" id="detail-intl-secondary-card">
                    <div class="card-label" id="detail-intl-secondary-label">국제가격</div>
                    <div class="card-value" id="detail-intl-secondary-value">-</div>
                    <div class="card-sub" id="detail-intl-secondary-sub"></div>

            <section class="chart-container">
                <div class="section-header">
                    <h2 id="price-chart-title">가격 비교</h2>
                    <div class="mode-toggle" id="gold-source-toggle" role="group" aria-label="금 국제가격 기준 선택" hidden>
                        <button type="button" class="mode-btn" data-gold-mode="london_spot">런던 현물</button>
                        <button type="button" class="mode-btn active" data-gold-mode="ny_futures">뉴욕선물</button>
                    </div>
                </div>
                <canvas id="priceChart"></canvas>
            </section>

            <section class="chart-container">
                <div class="section-header">
                    <h2>괴리율 추이 (%)</h2>
                </div>
                <canvas id="gapChart"></canvas>
            </section>

            <section class="table-container">
                <div class="section-header">
                    <h2 id="table-title">괴리율 발생 구간</h2>
                </div>
                <div class="table-scroll">
                    <table id="gapTable">
                        <thead>
                            <tr>
                                <th>시작일</th>
                                <th>종료일</th>
                                <th>최대 괴리율</th>
                                <th>지속일수</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <p id="no-periods" style="display:none; text-align:center;"></p>
            </section>
        </div>

        <div class="footer">
            데이터 출처: KRX, COMEX, Bithumb, Upbit, yfinance
        </div>
    </main>

    <script>
    const THEME_STORAGE_KEY = 'theme';
    let currentTheme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';

    const ASSETS = {
        gold: {
            label: 'Gold',
            summary: 'KRX 금현물과 COMEX 금 가격을 원화 기준으로 비교합니다.',
            domesticLabel: '국내 (KRX 금현물)',
            intlLabel: '뉴욕선물 GC=F (KRW 환산)',
            unit: 'KRW/g',
            threshold: 5,
            domesticColor: '#d9a441',
            intlColor: '#2a78c9',
            gapColor: '#d9a441',
            highlightColor: 'rgba(217, 164, 65, 0.12)',
            sourceSummary: '국내: ACE KRX금현물 411060.KS · 환율: USD/KRW KRW=X · 국제 기준은 토글로 선택',
            intlModes: {
                london_spot: {
                    label: '런던 현물',
                    intlLabel: '런던 현물 XAU/USD (KRW 환산)',
                    sourceSummary: '국제: World Gold Council/ICE spot + Gold API latest XAU',
                },
                ny_futures: {
                    label: '뉴욕선물',
                    intlLabel: '뉴욕선물 GC=F (KRW 환산)',
                    sourceSummary: '국제: COMEX Gold Futures GC=F (Yahoo Finance)',
                },
            },
        },
        bitcoin: {
            label: 'Bitcoin',
            summary: '업비트 BTC와 BTC-USD 국제가의 프리미엄을 추적합니다.',
            domesticLabel: '업비트 BTC',
            intlLabel: 'BTC-USD (KRW 환산)',
            unit: 'KRW',
            threshold: 5,
            domesticColor: '#d9791f',
            intlColor: '#2a78c9',
            gapColor: '#d9791f',
            highlightColor: 'rgba(217, 121, 31, 0.12)',
            sourceSummary: '국내: Upbit KRW-BTC · 국제: BTC-USD (Yahoo Finance) · 환율: USD/KRW KRW=X',
        },
        usdt: {
            label: 'USDT',
            summary: '빗썸 USDT/KRW와 USDT-USD 환산 기준의 괴리율을 확인합니다.',
            domesticLabel: '빗썸 USDT',
            intlLabel: 'USDT-USD (KRW 환산)',
            unit: 'KRW',
            threshold: 3,
            domesticColor: '#1f9b57',
            intlColor: '#2a78c9',
            gapColor: '#1f9b57',
            highlightColor: 'rgba(31, 155, 87, 0.12)',
            sourceSummary: '국내: Bithumb USDT_KRW · 국제: USDT-USD (Yahoo Finance) · 환율: USD/KRW KRW=X',
        },
    };

    let allData = null;
    let currentAsset = 'gold';
    let priceChartInstance = null;
    let gapChartInstance = null;
    let refreshInFlight = false;
    let currentGoldIntlMode = 'ny_futures';

    function getThemeColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function getChartTheme() {
        return {
            text: getThemeColor('--text'),
            textDim: getThemeColor('--text-dim'),
            grid: getThemeColor('--grid'),
            surface: getThemeColor('--surface'),
            surface2: getThemeColor('--surface2'),
            border: getThemeColor('--border'),
            up: getThemeColor('--up'),
            down: getThemeColor('--down'),
        };
    }

    function applyChartDefaults() {
        const theme = getChartTheme();
        Chart.defaults.color = theme.textDim;
        Chart.defaults.borderColor = theme.grid;
        Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    }

    function setRefreshButtonState(isBusy) {
        refreshInFlight = isBusy;
        const refreshBtn = document.getElementById('refreshBtn');
        if (!refreshBtn) return;
        refreshBtn.disabled = isBusy;
        refreshBtn.classList.toggle('is-refreshing', isBusy);
        refreshBtn.textContent = isBusy ? '새로고침 중...' : '새로고침';
    }

    async function loadData({ showLoading = true, bustCache = false } = {}) {
        if (refreshInFlight) return;
        setRefreshButtonState(true);
        document.getElementById('error').style.display = 'none';

        if (showLoading && !allData) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
        }

        try {
            const url = bustCache ? 'data.json?t=' + Date.now() : 'data.json';
            const resp = await fetch(url);
            if (!resp.ok) {
                let err = {};
                try {
                    err = await resp.json();
                } catch (e) {
                    err = {};
                }
                throw new Error(err.error || `HTTP ${resp.status}`);
            }

            allData = await resp.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            if (allData.updated_at) {
                document.getElementById('updated-at').textContent =
                    '최종 업데이트: ' + allData.updated_at;
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                const asset = btn.dataset.asset;
                btn.disabled = !allData[asset];
            });

            const requestedAsset = getRequestedAsset();
            const requestedGoldMode = getRequestedGoldMode();
            if (requestedGoldMode) currentGoldIntlMode = requestedGoldMode;
            const firstAvailable = [requestedAsset, currentAsset, 'gold', 'bitcoin', 'usdt'].find(a => a && allData[a]);
            if (firstAvailable) switchTab(firstAvailable);
        } catch (e) {
            if (!allData) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'none';
            }
            document.getElementById('error').style.display = 'block';
            document.querySelector('.error-msg').textContent =
                '데이터 로딩 실패: ' + e.message;
        } finally {
            setRefreshButtonState(false);
        }
    }

    function getRequestedAsset() {
        const asset = new URLSearchParams(window.location.search).get('asset');
        return ASSETS[asset] ? asset : '';
    }

    function getRequestedGoldMode() {
        const mode = new URLSearchParams(window.location.search).get('gold_source');
        return ASSETS.gold.intlModes[mode] ? mode : '';
    }

    function getKstDateString(date = new Date()) {
        const parts = new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Seoul',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
        }).formatToParts(date).reduce((acc, part) => {
            acc[part.type] = part.value;
            return acc;
        }, {});
        return `${parts.year}-${parts.month}-${parts.day}`;
    }

    function getKstTimeString(date = new Date()) {
        return new Intl.DateTimeFormat('ko-KR', {
            timeZone: 'Asia/Seoul',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
        }).format(date).replace(/\.$/, '');
    }

    function getActiveAssetData(data, config) {
        if (currentAsset !== 'gold' || !data.intl_modes) return data;
        return data.intl_modes[currentGoldIntlMode] || data.intl_modes[data.default_intl_mode] || data;
    }

    function getActiveChartConfig(config) {
        if (currentAsset !== 'gold') return config;
        const modeConfig = config.intlModes[currentGoldIntlMode];
        return {
            ...config,
            intlLabel: modeConfig ? modeConfig.intlLabel : config.intlLabel,
        };
    }

    function latestValue(data, key) {
        const values = data && data[key];
        if (!values || values.length === 0) return null;
        return values[values.length - 1];
    }

    function roundNumber(value, digits = 2) {
        if (value == null || Number.isNaN(Number(value))) return null;
        const factor = 10 ** digits;
        return Math.round(Number(value) * factor) / factor;
    }

    function ensureSeries(data, key) {
        if (!Array.isArray(data[key])) {
            data[key] = Array(data.dates.length).fill(null);
        }
        while (data[key].length < data.dates.length) {
            data[key].push(data[key].length ? data[key][data[key].length - 1] : null);
        }
    }

    function upsertQuotePoint(data, date, values, threshold) {
        let idx = data.dates.indexOf(date);
        const arrayKeys = Object.keys(data).filter(key => key !== 'dates' && Array.isArray(data[key]));

        if (idx === -1) {
            data.dates.push(date);
            idx = data.dates.length - 1;
            arrayKeys.forEach(key => {
                const last = data[key].length ? data[key][data[key].length - 1] : null;
                data[key].push(last);
            });
        }

        Object.entries(values).forEach(([key, value]) => {
            ensureSeries(data, key);
            data[key][idx] = value;
        });

        ensureSeries(data, 'gap_pct');
        if (data.domestic_price[idx] != null && data.intl_price[idx] != null && data.intl_price[idx] !== 0) {
            data.gap_pct[idx] = roundNumber(((data.domestic_price[idx] - data.intl_price[idx]) / data.intl_price[idx]) * 100, 2);
        }
        data.high_gap_periods = buildHighGapPeriods(data, threshold);
    }

    function buildHighGapPeriods(data, threshold) {
        const periods = [];
        let inPeriod = false;
        let start = '';
        let maxGap = 0;

        data.dates.forEach((date, idx) => {
            const gap = Number(data.gap_pct[idx]);
            if (Number.isNaN(gap)) return;
            if (Math.abs(gap) >= threshold) {
                if (!inPeriod) {
                    inPeriod = true;
                    start = date;
                    maxGap = gap;
                } else if (Math.abs(gap) > Math.abs(maxGap)) {
                    maxGap = gap;
                }
            } else if (inPeriod) {
                const prevDate = data.dates[Math.max(idx - 1, 0)];
                periods.push({
                    start,
                    end: prevDate,
                    max_gap: roundNumber(maxGap, 2),
                    duration_days: Math.max(1, Math.round((new Date(prevDate) - new Date(start)) / 86400000) + 1),
                });
                inPeriod = false;
            }
        });

        if (inPeriod && data.dates.length) {
            const end = data.dates[data.dates.length - 1];
            periods.push({
                start,
                end,
                max_gap: roundNumber(maxGap, 2),
                duration_days: Math.max(1, Math.round((new Date(end) - new Date(start)) / 86400000) + 1),
            });
        }
        return periods;
    }

    async function fetchJson(url) {
        const resp = await fetch(url, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return resp.json();
    }

    async function fetchBackendFreshData() {
        try {
            return await fetchJson('api/data?force=1&t=' + Date.now());
        } catch (e) {
            return null;
        }
    }

    async function fetchClientLiveQuotes() {
        const [fx, goldSpot, upbitBtc, binanceBtc, bithumbUsdt] = await Promise.allSettled([
            fetchJson('https://open.er-api.com/v6/latest/USD'),
            fetchJson('https://api.gold-api.com/price/XAU/USD'),
            fetchJson('https://api.upbit.com/v1/ticker?markets=KRW-BTC'),
            fetchJson('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT'),
            fetchJson('https://api.bithumb.com/public/ticker/USDT_KRW'),
        ]);

        const quote = {};
        if (fx.status === 'fulfilled' && fx.value && fx.value.rates && fx.value.rates.KRW) {
            quote.usdKrw = Number(fx.value.rates.KRW);
        }
        if (goldSpot.status === 'fulfilled' && goldSpot.value && goldSpot.value.price) {
            quote.goldSpotUsdOz = Number(goldSpot.value.price);
        }
        if (upbitBtc.status === 'fulfilled' && Array.isArray(upbitBtc.value) && upbitBtc.value[0]) {
            quote.btcKrw = Number(upbitBtc.value[0].trade_price);
        }
        if (binanceBtc.status === 'fulfilled' && binanceBtc.value && binanceBtc.value.price) {
            quote.btcUsd = Number(binanceBtc.value.price);
        }
        if (bithumbUsdt.status === 'fulfilled' && bithumbUsdt.value && bithumbUsdt.value.status === '0000') {
            quote.usdtKrw = Number(bithumbUsdt.value.data.closing_price);
        }
        return quote;
    }

    function syncGoldDefaultMode() {
        if (!allData.gold || !allData.gold.intl_modes) return;
        const defaultMode = allData.gold.default_intl_mode || 'ny_futures';
        const modeData = allData.gold.intl_modes[defaultMode];
        if (!modeData) return;
        ['dates', 'domestic_price', 'intl_price', 'gap_pct', 'usd_krw', 'high_gap_periods', 'gold_usd_oz'].forEach(key => {
            if (modeData[key]) allData.gold[key] = Array.isArray(modeData[key]) ? [...modeData[key]] : modeData[key];
        });
    }

    async function applyClientLiveQuotes() {
        if (!allData) throw new Error('기준 데이터가 아직 로드되지 않았습니다.');
        const quote = await fetchClientLiveQuotes();
        const date = getKstDateString();
        let applied = 0;

        if (allData.gold && allData.gold.intl_modes && quote.usdKrw) {
            const domestic = latestValue(allData.gold.intl_modes.ny_futures, 'domestic_price');
            const nyUsdOz = latestValue(allData.gold.intl_modes.ny_futures, 'gold_usd_oz');
            if (domestic != null && nyUsdOz != null) {
                upsertQuotePoint(allData.gold.intl_modes.ny_futures, date, {
                    domestic_price: roundNumber(domestic, 2),
                    gold_usd_oz: roundNumber(nyUsdOz, 6),
                    usd_krw: roundNumber(quote.usdKrw, 2),
                    intl_price: roundNumber((nyUsdOz * quote.usdKrw) / TROY_OZ_TO_GRAM, 2),
                }, ASSETS.gold.threshold);
                applied++;
            }
            if (domestic != null && quote.goldSpotUsdOz) {
                upsertQuotePoint(allData.gold.intl_modes.london_spot, date, {
                    domestic_price: roundNumber(domestic, 2),
                    gold_usd_oz: roundNumber(quote.goldSpotUsdOz, 6),
                    usd_krw: roundNumber(quote.usdKrw, 2),
                    intl_price: roundNumber((quote.goldSpotUsdOz * quote.usdKrw) / TROY_OZ_TO_GRAM, 2),
                }, ASSETS.gold.threshold);
                applied++;
            }
            syncGoldDefaultMode();
        }

        if (allData.bitcoin && quote.usdKrw && quote.btcKrw && quote.btcUsd) {
            upsertQuotePoint(allData.bitcoin, date, {
                domestic_price: roundNumber(quote.btcKrw, 2),
                crypto_usd: roundNumber(quote.btcUsd, 6),
                usd_krw: roundNumber(quote.usdKrw, 2),
                intl_price: roundNumber(quote.btcUsd * quote.usdKrw, 2),
            }, ASSETS.bitcoin.threshold);
            applied++;
        }

        if (allData.usdt && quote.usdKrw && quote.usdtKrw) {
            upsertQuotePoint(allData.usdt, date, {
                domestic_price: roundNumber(quote.usdtKrw, 2),
                crypto_usd: 1,
                usd_krw: roundNumber(quote.usdKrw, 2),
                intl_price: roundNumber(quote.usdKrw, 2),
            }, ASSETS.usdt.threshold);
            applied++;
        }

        if (!applied) throw new Error('브라우저에서 접근 가능한 현재가 API 응답이 없습니다.');
        allData.updated_at = '브라우저 현재가 갱신: ' + getKstTimeString();
        return applied;
    }

    async function refreshCurrentData() {
        if (refreshInFlight) return;
        setRefreshButtonState(true);
        document.getElementById('error').style.display = 'none';
        try {
            const fresh = await fetchBackendFreshData();
            if (fresh) {
                allData = fresh;
            } else {
                await applyClientLiveQuotes();
            }
            if (allData.updated_at) {
                document.getElementById('updated-at').textContent = '최종 업데이트: ' + allData.updated_at;
            }
            switchTab(currentAsset);
        } catch (e) {
            document.getElementById('error').style.display = 'block';
            document.querySelector('.error-msg').textContent = '현재가 갱신 실패: ' + e.message;
        } finally {
            setRefreshButtonState(false);
        }
    }

    function updateGoldModeToggle() {
        const toggle = document.getElementById('gold-source-toggle');
        if (!toggle) return;
        toggle.hidden = currentAsset !== 'gold';
        toggle.querySelectorAll('.mode-btn').forEach(btn => {
            const active = btn.dataset.goldMode === currentGoldIntlMode;
            btn.classList.toggle('active', active);
            btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
    }

    function updateSourceNote(data, config) {
        const note = document.getElementById('source-note');
        if (!note) return;
        if (currentAsset === 'gold') {
            const modeConfig = config.intlModes[currentGoldIntlMode];
            note.textContent = [config.sourceSummary, modeConfig && modeConfig.sourceSummary].filter(Boolean).join(' · ');
            return;
        }
        note.textContent = config.sourceSummary || '';
    }

    function switchTab(asset) {
        currentAsset = asset;
        const data = allData && allData[asset];
        if (!data) return;
        const config = { ...ASSETS[asset] };
        if (data.domestic_label) {
            config.domesticLabel = data.domestic_label;
            if (asset === 'usdt') {
                config.sourceSummary = `국내: ${data.domestic_label} · 국제: USDT-USD (Yahoo Finance) · 환율: USD/KRW KRW=X`;
            }
        }
        const activeData = getActiveAssetData(data, config);
        const chartConfig = getActiveChartConfig(config);

        const url = new URL(window.location.href);
        url.searchParams.set('asset', asset);
        if (asset === 'gold') {
            url.searchParams.set('gold_source', currentGoldIntlMode);
        }
        window.history.replaceState(null, '', url);

        document.documentElement.style.setProperty('--asset-color', config.gapColor);
        document.getElementById('asset-title').textContent = config.label;
        document.getElementById('asset-summary').textContent = config.summary;
        updateSourceNote(data, config);
        updateGoldModeToggle();

        document.querySelectorAll('.tab-btn').forEach(btn => {
            const isActive = btn.dataset.asset === asset;
            btn.classList.toggle('active', isActive);
            btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });

        updateCards(data, config, activeData);

        document.getElementById('price-chart-title').textContent =
            config.label + ' 가격 비교 (' + chartConfig.unit + ')';
        document.getElementById('table-title').textContent =
            chartConfig.threshold + '% 이상 괴리율 발생 구간';
        document.getElementById('high-gap-label').textContent =
            chartConfig.threshold + '%+ 발생';

        if (priceChartInstance) { priceChartInstance.destroy(); priceChartInstance = null; }
        if (gapChartInstance) { gapChartInstance.destroy(); gapChartInstance = null; }

        applyChartDefaults();
        renderPriceChart(activeData, chartConfig);
        renderGapChart(activeData, chartConfig);
        renderTable(activeData.high_gap_periods, chartConfig);
    }

    const TROY_OZ_TO_GRAM = 31.1035;

    function updateCards(data, config, activeData) {
        data = activeData || data;
        const lastGap = data.gap_pct[data.gap_pct.length - 1];
        const absGaps = data.gap_pct.map(Math.abs);
        const maxGapIdx = absGaps.indexOf(Math.max(...absGaps));
        const maxGap = data.gap_pct[maxGapIdx];
        const avgGap = data.gap_pct.reduce((a, b) => a + b, 0) / data.gap_pct.length;

        document.getElementById('current-gap').textContent = lastGap.toFixed(2) + '%';
        document.getElementById('max-gap').textContent = maxGap.toFixed(2) + '%';
        document.getElementById('avg-gap').textContent = avgGap.toFixed(2) + '%';
        document.getElementById('high-gap-count').textContent =
            data.high_gap_periods.length + '회';

        const el = document.getElementById('current-gap');
        const card = el.closest('.card');
        el.classList.remove('high', 'low');
        card.classList.remove('alert');
        if (Math.abs(lastGap) >= config.threshold) {
            el.classList.add('high');
            card.classList.add('alert');
        } else if (lastGap < 0) {
            el.classList.add('low');
        }

        const detailCards = document.getElementById('asset-detail-cards');
        detailCards.style.display = '';
        updateDetailCards(allData[currentAsset], config, data);
    }

    function updateDetailCards(assetData, config, activeData) {
        const lastUsdKrw = latestValue(activeData, 'usd_krw');
        const lastDomestic = latestValue(activeData, 'domestic_price');
        const lastIntl = latestValue(activeData, 'intl_price');
        const lastCryptoUsd = latestValue(activeData, 'crypto_usd');
        const secondaryCard = document.getElementById('detail-intl-secondary-card');

        document.getElementById('detail-usd-krw').textContent =
            formatKrw(lastUsdKrw, { maximumFractionDigits: 2 });

        document.getElementById('detail-domestic-label').textContent =
            currentAsset === 'gold' ? '국내가격 (원/g)' : '국내가격';
        document.getElementById('detail-domestic-value').textContent =
            formatAssetKrw(lastDomestic, currentAsset);
        document.getElementById('detail-domestic-sub').textContent = config.domesticLabel;

        if (currentAsset === 'gold') {
            const londonUsdOz = latestValue(assetData.intl_modes && assetData.intl_modes.london_spot, 'gold_usd_oz');
            const nyUsdOz = latestValue(assetData.intl_modes && assetData.intl_modes.ny_futures, 'gold_usd_oz');

            document.getElementById('detail-intl-primary-label').textContent = '런던 현물 ($/oz)';
            document.getElementById('detail-intl-primary-value').textContent = formatUsd(londonUsdOz, { maximumFractionDigits: 2 });
            document.getElementById('detail-intl-primary-sub').textContent = 'WGC/ICE spot';

            secondaryCard.hidden = false;
            document.getElementById('detail-intl-secondary-label').textContent = '뉴욕선물 ($/oz)';
            document.getElementById('detail-intl-secondary-value').textContent = formatUsd(nyUsdOz, { maximumFractionDigits: 2 });
            document.getElementById('detail-intl-secondary-sub').textContent = 'COMEX GC=F';
            return;
        }

        document.getElementById('detail-intl-primary-label').textContent = '국제가격 (KRW 환산)';
        document.getElementById('detail-intl-primary-value').textContent = formatAssetKrw(lastIntl, currentAsset);
        document.getElementById('detail-intl-primary-sub').textContent =
            currentAsset === 'bitcoin'
                ? 'BTC-USD ' + formatUsd(lastCryptoUsd, { maximumFractionDigits: 2 })
                : 'USDT-USD ' + formatUsd(lastCryptoUsd, { minimumFractionDigits: 4, maximumFractionDigits: 4 });

        secondaryCard.hidden = true;
    }

    function formatPrice(value, asset) {
        if (asset === 'gold') return Number(value).toLocaleString() + ' 원/g';
        return Number(value).toLocaleString() + ' 원';
    }

    function formatKrw(value, options = {}) {
        if (value == null || Number.isNaN(Number(value))) return '-';
        return Number(value).toLocaleString('ko-KR', options) + ' 원';
    }

    function formatUsd(value, options = {}) {
        if (value == null || Number.isNaN(Number(value))) return '-';
        return '$' + Number(value).toLocaleString('en-US', options);
    }

    function formatAssetKrw(value, asset) {
        if (value == null || Number.isNaN(Number(value))) return '-';
        const digits = asset === 'usdt'
            ? { minimumFractionDigits: 2, maximumFractionDigits: 2 }
            : { maximumFractionDigits: 0 };
        return formatKrw(value, digits);
    }

    function renderPriceChart(data, config) {
        const ctx = document.getElementById('priceChart').getContext('2d');
        const theme = getChartTheme();
        priceChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.dates,
                datasets: [
                    {
                        label: config.domesticLabel,
                        data: data.domestic_price,
                        borderColor: config.domesticColor,
                        backgroundColor: config.domesticColor + '18',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        fill: false,
                        tension: 0.1,
                    },
                    {
                        label: config.intlLabel,
                        data: data.intl_price,
                        borderColor: config.intlColor,
                        backgroundColor: config.intlColor + '18',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        fill: false,
                        tension: 0.1,
                    },
                ],
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.35,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        type: 'category',
                        grid: { color: theme.grid },
                        ticks: { maxTicksLimit: 10, maxRotation: 0, font: { size: 11 }, color: theme.textDim },
                    },
                    y: {
                        grid: { color: theme.grid },
                        ticks: {
                            font: { size: 11 },
                            color: theme.textDim,
                            callback: v => v >= 1e6 ? (v / 1e6).toFixed(0) + 'M' : v.toLocaleString(),
                        },
                        title: { display: true, text: config.unit, font: { size: 11 }, color: theme.textDim },
                    },
                },
                plugins: {
                    legend: {
                        labels: { usePointStyle: true, pointStyle: 'circle', padding: 20, font: { size: 12 }, color: theme.textDim },
                    },
                    tooltip: {
                        backgroundColor: theme.surface2,
                        borderColor: theme.border,
                        borderWidth: 1,
                        titleColor: theme.text,
                        bodyColor: theme.text,
                        titleFont: { size: 12 },
                        bodyFont: { family: "'SFMono-Regular', Consolas, monospace", size: 12 },
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            label: ctx => ctx.dataset.label + ': ' + formatPrice(ctx.parsed.y, currentAsset),
                        },
                    },
                },
            },
        });
    }

    function buildHighlightBoxes(data, config) {
        const boxes = {};
        let inRegion = false, regionStart = null, regionIdx = 0;
        const threshold = config.threshold;

        for (let i = 0; i < data.gap_pct.length; i++) {
            if (Math.abs(data.gap_pct[i]) >= threshold) {
                if (!inRegion) { inRegion = true; regionStart = data.dates[i]; }
            } else if (inRegion) {
                boxes['box' + regionIdx] = {
                    type: 'box', xMin: regionStart, xMax: data.dates[i - 1],
                    backgroundColor: config.highlightColor, borderWidth: 0,
                };
                regionIdx++;
                inRegion = false;
            }
        }
        if (inRegion) {
            boxes['box' + regionIdx] = {
                type: 'box', xMin: regionStart, xMax: data.dates[data.dates.length - 1],
                backgroundColor: config.highlightColor, borderWidth: 0,
            };
        }
        return boxes;
    }

    function renderGapChart(data, config) {
        const ctx = document.getElementById('gapChart').getContext('2d');
        const theme = getChartTheme();
        const boxes = buildHighlightBoxes(data, config);
        const threshold = config.threshold;

        boxes['thresholdLine'] = {
            type: 'line', yMin: threshold, yMax: threshold,
            borderColor: theme.up, borderWidth: 1.5, borderDash: [6, 4],
            label: {
                display: true, content: '+' + threshold + '%', position: 'end',
                backgroundColor: theme.up, color: '#fff',
                font: { size: 10, family: "'SFMono-Regular', Consolas, monospace" }, padding: { x: 6, y: 3 },
            },
        };
        boxes['negThresholdLine'] = {
            type: 'line', yMin: -threshold, yMax: -threshold,
            borderColor: theme.down, borderWidth: 1.5, borderDash: [6, 4],
            label: {
                display: true, content: '-' + threshold + '%', position: 'end',
                backgroundColor: theme.down, color: '#fff',
                font: { size: 10, family: "'SFMono-Regular', Consolas, monospace" }, padding: { x: 6, y: 3 },
            },
        };
        boxes['zeroLine'] = {
            type: 'line', yMin: 0, yMax: 0,
            borderColor: theme.grid, borderWidth: 1,
        };

        const gradient = ctx.createLinearGradient(0, 0, 0, ctx.canvas.clientHeight || 300);
        gradient.addColorStop(0, config.gapColor + '30');
        gradient.addColorStop(1, config.gapColor + '02');

        gapChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.dates,
                datasets: [{
                    label: '괴리율 (%)',
                    data: data.gap_pct,
                    borderColor: config.gapColor,
                    backgroundColor: gradient,
                    borderWidth: 1.5,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: true,
                    tension: 0.1,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.35,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        type: 'category',
                        grid: { color: theme.grid },
                        ticks: { maxTicksLimit: 10, maxRotation: 0, font: { size: 11 }, color: theme.textDim },
                    },
                    y: {
                        grid: { color: theme.grid },
                        ticks: { font: { size: 11 }, color: theme.textDim, callback: v => v.toFixed(0) + '%' },
                        title: { display: true, text: '괴리율 (%)', font: { size: 11 }, color: theme.textDim },
                    },
                },
                plugins: {
                    legend: { display: false },
                    annotation: { annotations: boxes },
                    tooltip: {
                        backgroundColor: theme.surface2,
                        borderColor: theme.border,
                        borderWidth: 1,
                        titleColor: theme.text,
                        bodyColor: theme.text,
                        titleFont: { size: 12 },
                        bodyFont: { family: "'SFMono-Regular', Consolas, monospace", size: 12 },
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            label: ctx => '괴리율: ' + ctx.parsed.y.toFixed(2) + '%',
                        },
                    },
                },
            },
        });
    }

    function renderTable(periods, config) {
        const tbody = document.querySelector('#gapTable tbody');
        tbody.innerHTML = '';

        const noPeriods = document.getElementById('no-periods');
        const table = document.getElementById('gapTable');

        if (!periods || periods.length === 0) {
            table.style.display = 'none';
            noPeriods.textContent = config.threshold + '% 이상 괴리율 발생 구간이 없습니다.';
            noPeriods.style.display = 'block';
            return;
        }

        table.style.display = '';
        noPeriods.style.display = 'none';

        [...periods].sort((a, b) => b.max_gap - a.max_gap).forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${p.start}</td>
                <td>${p.end}</td>
                <td class="highlight">${p.max_gap.toFixed(2)}%</td>
                <td>${p.duration_days}일</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateThemeButtonLabel() {
        const themeBtn = document.getElementById('themeToggle');
        if (!themeBtn) return;
        themeBtn.setAttribute('aria-label', currentTheme === 'dark' ? '일반 모드로 전환' : '다크 모드로 전환');
        themeBtn.title = '테마 전환';
    }

    function applyTheme(theme, { persist = true, rerender = true } = {}) {
        currentTheme = theme === 'dark' ? 'dark' : 'light';
        document.documentElement.dataset.theme = currentTheme;
        updateThemeButtonLabel();

        if (persist) {
            try {
                localStorage.setItem(THEME_STORAGE_KEY, currentTheme);
            } catch (e) {
                // Ignore storage failures and keep the session theme.
            }
        }

        if (rerender && allData && allData[currentAsset]) {
            switchTab(currentAsset);
        }
    }

    function bindThemeButton() {
        const themeBtn = document.getElementById('themeToggle');
        if (!themeBtn) return;
        themeBtn.addEventListener('click', () => {
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
        updateThemeButtonLabel();
    }

    function bindRefreshButton() {
        const refreshBtn = document.getElementById('refreshBtn');
        if (!refreshBtn) return;
        refreshBtn.addEventListener('click', refreshCurrentData);
    }

    function bindGoldModeButtons() {
        document.querySelectorAll('[data-gold-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentGoldIntlMode = btn.dataset.goldMode;
                if (allData && allData.gold) switchTab('gold');
            });
        });
    }

    applyChartDefaults();
    bindThemeButton();
    bindRefreshButton();
    bindGoldModeButtons();
    loadData();
    </script>
</body>
</html>
