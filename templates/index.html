<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김치프리미엄 대시보드</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>김치프리미엄 대시보드</h1>
            <p class="subtitle" id="subtitle">GOLD / BITCOIN / USDT</p>
            <p class="updated-at" id="updated-at"></p>
        </header>

        <div class="tab-nav">
            <button class="tab-btn active" data-asset="gold" onclick="switchTab('gold')">GOLD</button>
            <button class="tab-btn" data-asset="bitcoin" onclick="switchTab('bitcoin')">BITCOIN</button>
            <button class="tab-btn" data-asset="usdt" onclick="switchTab('usdt')">USDT</button>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p>데이터를 불러오는 중...</p>
        </div>

        <div id="error" style="display:none;">
            <p class="error-msg"></p>
        </div>

        <div id="content" style="display:none;">
            <!-- Summary Cards -->
            <div class="cards">
                <div class="card">
                    <div class="card-label">현재 괴리율</div>
                    <div class="card-value" id="current-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label">최대 괴리율</div>
                    <div class="card-value" id="max-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label">평균 괴리율</div>
                    <div class="card-value" id="avg-gap">-</div>
                </div>
                <div class="card">
                    <div class="card-label" id="high-gap-label">5%+ 발생 횟수</div>
                    <div class="card-value" id="high-gap-count">-</div>
                </div>
            </div>

            <!-- Chart 1: Price Comparison -->
            <div class="chart-container">
                <h2 id="price-chart-title">가격 비교</h2>
                <canvas id="priceChart"></canvas>
            </div>

            <!-- Chart 2: Gap Percentage -->
            <div class="chart-container">
                <h2>괴리율 추이 (%)</h2>
                <canvas id="gapChart"></canvas>
            </div>

            <!-- Table: High Gap Periods -->
            <div class="table-container">
                <h2 id="table-title">괴리율 발생 구간</h2>
                <table id="gapTable">
                    <thead>
                        <tr>
                            <th>시작일</th>
                            <th>종료일</th>
                            <th>최대 괴리율</th>
                            <th>지속일수</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <p id="no-periods" style="display:none; color:#888; text-align:center;"></p>
            </div>
        </div>
    </div>

    <script>
    const ASSETS = {
        gold: {
            label: '금 (Gold)',
            domesticLabel: '국내 금 (KRX 금현물)',
            intlLabel: '국제 금 (COMEX, KRW 환산)',
            unit: 'KRW/g',
            threshold: 5,
            domesticColor: '#e74c3c',
            intlColor: '#3498db',
            highlightColor: 'rgba(231, 76, 60, 0.12)',
        },
        bitcoin: {
            label: '비트코인 (Bitcoin)',
            domesticLabel: '업비트 BTC',
            intlLabel: '바이낸스 BTC (KRW 환산)',
            unit: 'KRW',
            threshold: 5,
            domesticColor: '#f39c12',
            intlColor: '#3498db',
            highlightColor: 'rgba(243, 156, 18, 0.12)',
        },
        usdt: {
            label: 'USDT',
            domesticLabel: '업비트 USDT',
            intlLabel: 'USDT 국제가 (KRW 환산)',
            unit: 'KRW',
            threshold: 3,
            domesticColor: '#27ae60',
            intlColor: '#3498db',
            highlightColor: 'rgba(39, 174, 96, 0.12)',
        },
    };

    let allData = null;
    let currentAsset = 'gold';
    let priceChartInstance = null;
    let gapChartInstance = null;

    async function loadData() {
        try {
            const resp = await fetch('data.json');
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.error || `HTTP ${resp.status}`);
            }
            allData = await resp.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            if (allData.updated_at) {
                document.getElementById('updated-at').textContent =
                    '데이터 갱신: ' + allData.updated_at;
            }

            // 탭 버튼 활성화/비활성화
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const asset = btn.dataset.asset;
                if (!allData[asset]) {
                    btn.disabled = true;
                    btn.style.opacity = '0.4';
                    btn.style.cursor = 'not-allowed';
                }
            });

            // 사용 가능한 첫 번째 자산으로 시작
            const firstAvailable = ['gold', 'bitcoin', 'usdt'].find(a => allData[a]);
            if (firstAvailable) {
                switchTab(firstAvailable);
            }
        } catch (e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.querySelector('.error-msg').textContent =
                '데이터 로딩 실패: ' + e.message;
        }
    }

    function switchTab(asset) {
        currentAsset = asset;
        const config = ASSETS[asset];
        const data = allData[asset];

        if (!data) return;

        // Update tab buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.asset === asset);
        });

        // Update subtitle
        document.getElementById('subtitle').textContent = config.label;

        // Update cards
        updateCards(data, config);

        // Update chart titles
        document.getElementById('price-chart-title').textContent =
            config.label + ' 가격 비교 (' + config.unit + ')';
        document.getElementById('table-title').textContent =
            config.threshold + '% 이상 괴리율 발생 구간';
        document.getElementById('high-gap-label').textContent =
            config.threshold + '%+ 발생 횟수';

        // Destroy existing charts
        if (priceChartInstance) {
            priceChartInstance.destroy();
            priceChartInstance = null;
        }
        if (gapChartInstance) {
            gapChartInstance.destroy();
            gapChartInstance = null;
        }

        // Render charts
        renderPriceChart(data, config);
        renderGapChart(data, config);
        renderTable(data.high_gap_periods, config);
    }

    function updateCards(data, config) {
        const lastGap = data.gap_pct[data.gap_pct.length - 1];
        const absGaps = data.gap_pct.map(Math.abs);
        const maxGapIdx = absGaps.indexOf(Math.max(...absGaps));
        const maxGap = data.gap_pct[maxGapIdx];
        const avgGap = data.gap_pct.reduce((a, b) => a + b, 0) / data.gap_pct.length;

        document.getElementById('current-gap').textContent = lastGap.toFixed(2) + '%';
        document.getElementById('max-gap').textContent = maxGap.toFixed(2) + '%';
        document.getElementById('avg-gap').textContent = avgGap.toFixed(2) + '%';
        document.getElementById('high-gap-count').textContent =
            data.high_gap_periods.length + '회';

        const currentGapEl = document.getElementById('current-gap');
        currentGapEl.classList.remove('high', 'low');
        if (lastGap >= config.threshold) {
            currentGapEl.classList.add('high');
        } else if (lastGap < 0) {
            currentGapEl.classList.add('low');
        }
    }

    function formatPrice(value, asset) {
        const config = ASSETS[asset];
        if (asset === 'gold') {
            return Number(value).toLocaleString() + ' 원/g';
        } else if (asset === 'bitcoin') {
            return Number(value).toLocaleString() + ' 원';
        } else {
            return Number(value).toLocaleString() + ' 원';
        }
    }

    function renderPriceChart(data, config) {
        const ctx = document.getElementById('priceChart').getContext('2d');
        priceChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.dates,
                datasets: [
                    {
                        label: config.domesticLabel,
                        data: data.domestic_price,
                        borderColor: config.domesticColor,
                        backgroundColor: config.domesticColor + '1a',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: false,
                    },
                    {
                        label: config.intlLabel,
                        data: data.intl_price,
                        borderColor: config.intlColor,
                        backgroundColor: config.intlColor + '1a',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: false,
                    },
                ],
            },
            options: {
                responsive: true,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                scales: {
                    x: {
                        type: 'category',
                        ticks: {
                            maxTicksLimit: 12,
                            maxRotation: 45,
                        },
                    },
                    y: {
                        title: { display: true, text: config.unit },
                    },
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                return ctx.dataset.label + ': ' +
                                    formatPrice(ctx.parsed.y, currentAsset);
                            },
                        },
                    },
                },
            },
        });
    }

    function buildHighlightBoxes(data, config) {
        const boxes = {};
        let inRegion = false;
        let regionStart = null;
        let regionIdx = 0;
        const threshold = config.threshold;

        for (let i = 0; i < data.gap_pct.length; i++) {
            if (Math.abs(data.gap_pct[i]) >= threshold) {
                if (!inRegion) {
                    inRegion = true;
                    regionStart = data.dates[i];
                }
            } else {
                if (inRegion) {
                    boxes['box' + regionIdx] = {
                        type: 'box',
                        xMin: regionStart,
                        xMax: data.dates[i - 1],
                        backgroundColor: config.highlightColor,
                        borderWidth: 0,
                    };
                    regionIdx++;
                    inRegion = false;
                }
            }
        }
        if (inRegion) {
            boxes['box' + regionIdx] = {
                type: 'box',
                xMin: regionStart,
                xMax: data.dates[data.dates.length - 1],
                backgroundColor: config.highlightColor,
                borderWidth: 0,
            };
        }
        return boxes;
    }

    function renderGapChart(data, config) {
        const ctx = document.getElementById('gapChart').getContext('2d');
        const highlightBoxes = buildHighlightBoxes(data, config);
        const threshold = config.threshold;

        highlightBoxes['thresholdLine'] = {
            type: 'line',
            yMin: threshold,
            yMax: threshold,
            borderColor: 'rgba(231, 76, 60, 0.7)',
            borderWidth: 2,
            borderDash: [6, 4],
            label: {
                display: true,
                content: threshold + '%',
                position: 'end',
                backgroundColor: 'rgba(231, 76, 60, 0.8)',
                color: '#fff',
                font: { size: 11 },
            },
        };

        highlightBoxes['negThresholdLine'] = {
            type: 'line',
            yMin: -threshold,
            yMax: -threshold,
            borderColor: 'rgba(41, 128, 185, 0.7)',
            borderWidth: 2,
            borderDash: [6, 4],
            label: {
                display: true,
                content: '-' + threshold + '%',
                position: 'end',
                backgroundColor: 'rgba(41, 128, 185, 0.8)',
                color: '#fff',
                font: { size: 11 },
            },
        };

        highlightBoxes['zeroLine'] = {
            type: 'line',
            yMin: 0,
            yMax: 0,
            borderColor: 'rgba(0, 0, 0, 0.3)',
            borderWidth: 1,
        };

        gapChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.dates,
                datasets: [
                    {
                        label: '괴리율 (%)',
                        data: data.gap_pct,
                        borderColor: '#2c3e50',
                        backgroundColor: 'rgba(44, 62, 80, 0.1)',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: true,
                    },
                ],
            },
            options: {
                responsive: true,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                scales: {
                    x: {
                        type: 'category',
                        ticks: {
                            maxTicksLimit: 12,
                            maxRotation: 45,
                        },
                    },
                    y: {
                        title: { display: true, text: '괴리율 (%)' },
                    },
                },
                plugins: {
                    annotation: {
                        annotations: highlightBoxes,
                    },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                return '괴리율: ' + ctx.parsed.y.toFixed(2) + '%';
                            },
                        },
                    },
                },
            },
        });
    }

    function renderTable(periods, config) {
        const tbody = document.querySelector('#gapTable tbody');
        tbody.innerHTML = '';

        const noPeriods = document.getElementById('no-periods');
        const table = document.getElementById('gapTable');

        if (!periods || periods.length === 0) {
            table.style.display = 'none';
            noPeriods.textContent = config.threshold + '% 이상 괴리율 발생 구간이 없습니다.';
            noPeriods.style.display = 'block';
            return;
        }

        table.style.display = '';
        noPeriods.style.display = 'none';

        const sorted = [...periods].sort((a, b) => b.max_gap - a.max_gap);
        sorted.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${p.start}</td>
                <td>${p.end}</td>
                <td class="highlight">${p.max_gap.toFixed(2)}%</td>
                <td>${p.duration_days}일</td>
            `;
            tbody.appendChild(tr);
        });
    }

    loadData();
    </script>
</body>
</html>
