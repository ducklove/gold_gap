name: Update data.json

on:
  schedule:
    - cron: '*/30 * * * *'  # 정적 배포 지연을 줄이기 위해 30분마다 최신 quote 반영
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write

# cron과 수동 실행이 겹칠 때 push 충돌 방지 (진행 중 실행은 끝까지 보장)
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data.json
        run: python generate_data.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update data.json $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 실패가 조용히 누적되지 않도록 이슈로 알림 (열린 이슈가 있으면 코멘트로 합침)
      - name: Report failure as issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create data-update-failure --color D93F0B \
            --description "데이터 갱신 워크플로우 실패" --force || true
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body="update-data 워크플로우가 실패했습니다. 실행 로그: ${run_url}"
          existing=$(gh issue list --label data-update-failure --state open \
            --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "데이터 갱신 실패: update-data 워크플로우" \
              --label data-update-failure --body "$body"
          fi
