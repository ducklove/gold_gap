name: Update data.json

on:
  schedule:
    - cron: '*/30 * * * *'  # 정적 배포 지연을 줄이기 위해 30분마다 최신 quote 반영
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write

# cron과 수동 실행이 겹칠 때 push 충돌 방지 (진행 중 실행은 끝까지 보장)
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # data.json은 master가 아닌 data 전용 브랜치에 산다 (코드 히스토리 오염 방지).
      # 증분 갱신의 기준이자 임계 돌파 비교의 직전 스냅샷.
      - name: Fetch current data.json (data 브랜치)
        run: |
          git fetch --depth=1 origin data
          git show FETCH_HEAD:data.json > data.json
          cp data.json /tmp/data_prev.json

      - name: Generate data.json
        run: python generate_data.py

      # SNS 공유 카드 — 실패해도 데이터 갱신은 계속 (비치명)
      - name: Generate og.png
        run: python -m goldgap.og_image data.json og.png || echo "og 이미지 생성 실패 — 계속 진행"

      - name: Detect threshold crossings
        id: alerts
        run: |
          python -m goldgap.alerts /tmp/data_prev.json data.json | tee /tmp/crossings.txt
          if [ -s /tmp/crossings.txt ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push (data 브랜치)
        id: commit
        run: |
          if cmp -s data.json /tmp/data_prev.json; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git worktree add --detach /tmp/data-wt FETCH_HEAD
            cp data.json /tmp/data-wt/data.json
            if [ -f og.png ]; then cp og.png /tmp/data-wt/og.png; fi
            cd /tmp/data-wt
            git add data.json
            if [ -f og.png ]; then git add og.png; fi
            git commit -m "Update data.json $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push origin HEAD:refs/heads/data
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 임계치 신규 진입 시 이슈 알림 (열린 알림 이슈가 있으면 코멘트로 합침)
      - name: Threshold crossing alert
        if: steps.alerts.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create kimchi-alert --color F5A623 \
            --description "괴리율 임계 돌파 알림" --force || true
          {
            cat /tmp/crossings.txt
            echo ""
            echo "대시보드: https://ducklove.github.io/gold_gap/"
          } > /tmp/alert_body.txt
          existing=$(gh issue list --label kimchi-alert --state open \
            --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file /tmp/alert_body.txt
          else
            gh issue create --title "괴리율 임계 돌파 알림" \
              --label kimchi-alert --body-file /tmp/alert_body.txt
          fi

      # 선택적 웹훅 알림 — 리포 시크릿이 설정된 경우에만 발송 (없으면 조용히 skip).
      # DISCORD_WEBHOOK_URL 또는 TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID (README 참고)
      - name: Webhook alert (optional)
        if: steps.alerts.outputs.found == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          text="$(cat /tmp/crossings.txt)
          대시보드: https://ducklove.github.io/gold_gap/"
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            python3 -c 'import json,sys; open("/tmp/discord.json","w").write(json.dumps({"content": sys.argv[1]}))' "$text"
            curl -sS -X POST -H 'Content-Type: application/json' \
              -d @/tmp/discord.json "$DISCORD_WEBHOOK_URL" || true
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${text}" || true
          fi

      # 실패가 조용히 누적되지 않도록 이슈로 알림 (열린 이슈가 있으면 코멘트로 합침)
      - name: Report failure as issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create data-update-failure --color D93F0B \
            --description "데이터 갱신 워크플로우 실패" --force || true
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body="update-data 워크플로우가 실패했습니다. 실행 로그: ${run_url}"
          existing=$(gh issue list --label data-update-failure --state open \
            --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "데이터 갱신 실패: update-data 워크플로우" \
              --label data-update-failure --body "$body"
          fi
