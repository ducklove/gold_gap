name: CI

on:
  push:
    # data 브랜치는 데이터 파일만 담는 전용 브랜치 — 코드 CI 대상 아님
    branches: ['**', '!data']
    paths-ignore:
      - 'data.json'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'data.json'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # 골든 회귀 테스트(병합·구간 재계산)가 실제 데이터를 입력으로 사용
      - name: Fetch golden data.json (data 브랜치)
        run: |
          git fetch --depth=1 origin data
          git show FETCH_HEAD:data.json > data.json

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # static/js 순수 모듈(periods/stats/market/decompose/format/i18n) 단위 테스트
      - name: Test (node --test)
        run: node --test tests/js
