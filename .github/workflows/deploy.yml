name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # data.json·og.png는 master가 아닌 data 전용 브랜치에 산다
      - name: Fetch data files (data 브랜치)
        run: |
          git fetch --depth=1 origin data
          git show FETCH_HEAD:data.json > data.json
          git show FETCH_HEAD:og.png > og.png || rm -f og.png

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp templates/index.html _site/index.html
          cp -r static _site/static
          cp sw.js _site/sw.js
          cp manifest.webmanifest _site/manifest.webmanifest
          cp config.json _site/config.json
          cp data.json _site/data.json
          if [ -s og.png ]; then cp og.png _site/og.png; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
