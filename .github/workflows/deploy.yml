name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00) 갱신
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data
        run: python generate_data.py

      - name: Assemble static site
        run: |
          mkdir -p _site/static
          cp templates/index.html _site/index.html
          cp static/style.css _site/static/style.css
          cp data.json _site/data.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
